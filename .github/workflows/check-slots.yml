name: MCA Slot Monitor

on:
  schedule:
    # Check 4 times per day: 07:00, 11:00, 15:00, 19:00 UTC (adjust to your timezone)
    - cron: "0 7 * * *"
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      send_screenshots:
        description: "Email all stage screenshots after the run?"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run MCA slot check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          MCA_SDS_NUMBER: ${{ secrets.MCA_SDS_NUMBER }}
          MCA_DOB: ${{ secrets.MCA_DOB }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TARGET_DATE: ${{ secrets.TARGET_DATE }}
          SEND_SCREENSHOTS: ${{ inputs.send_screenshots || 'false' }}
        run: npx tsx scripts/check-mca-slots.ts

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshot-*.png
          retention-days: 3
          if-no-files-found: ignore
